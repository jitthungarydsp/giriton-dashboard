name: Giriton Robots

on:
  workflow_dispatch:
    inputs:
      run_folgaltsag:
        description: "Folgaltsag robot futtatasa"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_girition:
        description: "Girition robot futtatasa"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      run_dsp:
        description: "DSP statisztika futtatasa"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      girition_start_date:
        description: "Girition kezdo datum YYYY-MM-DD formatumban"
        required: false
        default: ""
        type: string
      girition_days:
        description: "Girition lekerdezes napok szama"
        required: false
        default: "10"
        type: string
  schedule:
    - cron: "0 * * * *"
    - cron: "0 4 * * *"

jobs:
  folgaltsag:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_folgaltsag == 'true') }}
    timeout-minutes: 45

    env:
      GIRITON_USER: ${{ secrets.GIRITON_USER }}
      GIRITON_PASSWORD: ${{ secrets.GIRITON_PASSWORD }}
      GIRITON_GOOGLE_CREDENTIALS_JSON: ${{ secrets.GIRITON_GOOGLE_CREDENTIALS_JSON }}
      GIRITION_START_DATE: ${{ github.event.inputs.girition_start_date || '' }}
      GIRITION_DAYS: ${{ github.event.inputs.girition_days || '10' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate folgaltsag environment
        run: |
          test -n "$GIRITON_USER" || (echo "Missing GIRITON_USER secret" && exit 1)
          test -n "$GIRITON_PASSWORD" || (echo "Missing GIRITON_PASSWORD secret" && exit 1)
          test -n "$GIRITON_GOOGLE_CREDENTIALS_JSON" || (echo "Missing GIRITON_GOOGLE_CREDENTIALS_JSON secret" && exit 1)
          python -c "import json, os; json.loads(os.environ['GIRITON_GOOGLE_CREDENTIALS_JSON']); print('Google credentials JSON OK')"
          google-chrome --version || chromium-browser --version || chromium --version

      - name: Run folgaltsag robot
        run: |
          python -m robot --loglevel DEBUG --outputdir results/folgaltsag folgaltsag_github.robot

      - name: Upload robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: folgaltsag-results
          path: |
            results/**
          if-no-files-found: ignore

  girition:
    runs-on: ubuntu-latest
    needs: folgaltsag
    if: ${{ always() && ((github.event_name == 'schedule' && github.event.schedule == '0 * * * *') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_girition == 'true')) }}
    timeout-minutes: 45

    env:
      GIRITON_USER: ${{ secrets.GIRITON_USER }}
      GIRITON_PASSWORD: ${{ secrets.GIRITON_PASSWORD }}
      GIRITON_GOOGLE_CREDENTIALS_JSON: ${{ secrets.GIRITON_GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate girition environment
        run: |
          test -n "$GIRITON_USER" || (echo "Missing GIRITON_USER secret" && exit 1)
          test -n "$GIRITON_PASSWORD" || (echo "Missing GIRITON_PASSWORD secret" && exit 1)
          test -n "$GIRITON_GOOGLE_CREDENTIALS_JSON" || (echo "Missing GIRITON_GOOGLE_CREDENTIALS_JSON secret" && exit 1)
          python -c "import json, os; json.loads(os.environ['GIRITON_GOOGLE_CREDENTIALS_JSON']); print('Google credentials JSON OK')"
          google-chrome --version || chromium-browser --version || chromium --version

      - name: Run girition robot
        run: |
          python -m robot --loglevel DEBUG --outputdir results/girition --variable RUN_START_DATE:"$GIRITION_START_DATE" --variable DAYS_TO_SYNC:"$GIRITION_DAYS" girition_github.robot

      - name: Update shift reconciliation
        run: |
          python update_shift_reconciliation.py

      - name: Upload robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: girition-results
          path: |
            results/**
          if-no-files-found: ignore

  dsp:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_dsp == 'true') }}
    timeout-minutes: 30

    env:
      GIRITON_GOOGLE_CREDENTIALS_JSON: ${{ secrets.GIRITON_GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate DSP environment
        run: |
          test -n "$GIRITON_GOOGLE_CREDENTIALS_JSON" || (echo "Missing GIRITON_GOOGLE_CREDENTIALS_JSON secret" && exit 1)
          python -c "import json, os; json.loads(os.environ['GIRITON_GOOGLE_CREDENTIALS_JSON']); print('Google credentials JSON OK')"

      - name: Run DSP statistics
        run: |
          python dsp.py
